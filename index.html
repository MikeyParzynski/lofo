<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#2D5A3D">
  <title>LoFo — Local Forage</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --green: #4A7C59;
      --green-dark: #2D5A3D;
      --green-light: #E8F0E4;
      --orange: #E8863A;
      --orange-light: #FFF0E5;
      --pink: #D4728C;
      --pink-light: #FDE8EF;
      --brown: #8B6F47;
      --brown-light: #F5EDE0;
      --cream: #FFF8F0;
      --text: #2C2C2C;
      --text-light: #7A7A7A;
      --text-muted: #B0A899;
      --border: #E8E0D4;
      --safe: #4A9B5F;
      --caution: #E0A030;
      --danger: #D94444;
      --safe-bg: #E8F5E9;
      --caution-bg: #FFF8E1;
      --danger-bg: #FFEBEE;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--cream);
      color: var(--text);
      overflow: hidden;
      height: 100dvh;
      width: 100vw;
      position: fixed;
      touch-action: manipulation;
    }
    #app { height: 100%; width: 100%; position: relative; }

    /* Map */
    #map { height: 100%; width: 100%; z-index: 1; }
    .leaflet-control-zoom { display: none !important; }

    /* Custom map pin */
    .lofo-pin {
      background: none !important;
      border: none !important;
    }
    .pin-inner {
      width: 36px; height: 44px; position: relative;
      display: flex; align-items: flex-start; justify-content: center;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
      transition: transform 0.2s;
      cursor: pointer;
    }
    .pin-inner:hover { transform: scale(1.15); }
    .pin-inner svg { width: 36px; height: 44px; }
    .pin-emoji {
      position: absolute; top: 7px; left: 50%;
      transform: translateX(-50%); font-size: 15px;
    }
    .pin-ripe {
      position: absolute; top: -8px; right: -14px;
      background: var(--safe); color: white;
      font-size: 8px; font-weight: 700;
      padding: 2px 5px; border-radius: 6px;
      white-space: nowrap;
    }

    /* Splash screen */
    .splash {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column;
      background: linear-gradient(170deg, var(--green-dark) 0%, var(--green) 40%, var(--orange) 100%);
      color: white;
    }
    .splash.hidden { display: none; }
    .splash-content {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 30px 20px; text-align: center;
    }
    .splash h1 { font-size: 48px; font-weight: 800; letter-spacing: -1px; }
    .splash-sub { font-size: 14px; opacity: 0.85; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; }
    .splash-desc {
      margin-top: 32px; padding: 20px; background: rgba(255,255,255,0.12);
      border-radius: 20px; max-width: 300px; font-size: 15px; line-height: 1.6;
    }
    .splash-note {
      margin-top: 20px; padding: 14px 18px; background: rgba(255,255,255,0.08);
      border-radius: 16px; max-width: 300px; font-size: 13px; line-height: 1.6;
      font-style: italic; text-align: left;
    }
    .splash-actions { padding: 0 30px 50px; text-align: center; }
    .btn-primary {
      width: 100%; max-width: 300px; padding: 16px; border-radius: 16px;
      border: none; background: white; color: var(--green-dark);
      font-size: 17px; font-weight: 700; cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    .btn-primary:active { transform: scale(0.97); }
    .splash-legal-btn {
      background: none; border: none; color: rgba(255,255,255,0.7);
      font-size: 12px; cursor: pointer; padding: 12px; text-decoration: underline;
    }
    .splash-legal {
      background: rgba(0,0,0,0.25); border-radius: 12px; padding: 16px;
      max-width: 300px; font-size: 11px; line-height: 1.5; text-align: left;
      margin: 8px auto 0;
    }

    /* Auth screen */
    .auth-screen {
      position: fixed; inset: 0; z-index: 9998;
      display: flex; flex-direction: column;
      background: var(--cream);
    }
    .auth-screen.hidden { display: none; }
    .auth-header {
      background: linear-gradient(135deg, var(--green-dark), var(--green));
      padding: 60px 30px 30px; color: white; text-align: center;
      border-radius: 0 0 30px 30px;
    }
    .auth-header h2 { font-size: 28px; font-weight: 800; margin-bottom: 4px; }
    .auth-header p { opacity: 0.8; font-size: 14px; }
    .auth-form { padding: 30px; flex: 1; }
    .auth-form input {
      width: 100%; padding: 14px 16px; border-radius: 14px;
      border: 2px solid var(--border); background: white;
      font-size: 15px; margin-bottom: 12px; outline: none;
      transition: border-color 0.2s;
    }
    .auth-form input:focus { border-color: var(--green); }
    .auth-submit {
      width: 100%; padding: 16px; border-radius: 14px;
      border: none; background: var(--green); color: white;
      font-size: 16px; font-weight: 700; cursor: pointer;
      margin-top: 8px;
    }
    .auth-submit:active { opacity: 0.9; }
    .auth-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .auth-toggle {
      text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-light);
    }
    .auth-toggle button {
      background: none; border: none; color: var(--green);
      font-weight: 700; cursor: pointer; font-size: 14px;
    }
    .auth-error {
      background: var(--danger-bg); color: var(--danger);
      padding: 10px 14px; border-radius: 10px; font-size: 13px;
      margin-bottom: 12px; display: none;
    }

    /* Search bar */
    .search-bar {
      position: absolute; top: 50px; left: 16px; right: 16px; z-index: 1000;
      display: flex; gap: 10px;
    }
    .search-input-wrap {
      flex: 1; display: flex; align-items: center; gap: 8px;
      background: white; border-radius: 14px; padding: 10px 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .search-input-wrap input {
      flex: 1; border: none; outline: none; font-size: 14px; background: none;
    }
    .profile-btn {
      width: 42px; height: 42px; border-radius: 14px; border: none;
      background: white; box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      cursor: pointer; font-size: 16px;
    }

    /* Spot count */
    .spot-count {
      position: absolute; top: 104px; left: 16px; z-index: 1000;
      background: white; border-radius: 12px; padding: 6px 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      font-size: 12px; font-weight: 600;
    }

    /* Filter bar */
    .filter-bar {
      position: absolute; bottom: 90px; left: 12px; right: 12px; z-index: 1000;
      display: flex; justify-content: center;
    }
    .filter-bar-inner {
      display: flex; gap: 6px; padding: 8px 12px;
      background: white; border-radius: 20px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }
    .filter-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 8px 12px; border-radius: 14px; border: none;
      cursor: pointer; font-size: 12px; font-weight: 600;
      transition: all 0.2s;
    }
    .filter-btn.active { opacity: 1; }
    .filter-btn.inactive { opacity: 0.4; background: #F5F2ED !important; color: var(--text-light) !important; }
    .filter-btn span.emoji { font-size: 15px; }

    /* FAB */
    .fab {
      position: absolute; right: 20px; bottom: 180px; z-index: 1000;
      width: 52px; height: 52px; border-radius: 50%; border: none;
      background: var(--orange); color: white; font-size: 28px;
      cursor: pointer; box-shadow: 0 4px 16px rgba(232,134,58,0.4);
      display: flex; align-items: center; justify-content: center;
    }
    .fab:active { transform: scale(0.95); }

    /* Bottom nav */
    .bottom-nav {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 80px; background: white;
      border-top: 1px solid var(--border);
      display: flex; align-items: flex-start; justify-content: space-around;
      padding-top: 8px; z-index: 1000;
    }
    .nav-btn {
      background: none; border: none; cursor: pointer;
      text-align: center; padding: 4px 12px;
    }
    .nav-btn .icon { font-size: 22px; }
    .nav-btn .label { font-size: 10px; margin-top: 2px; font-weight: 600; }
    .nav-btn.active .label { color: var(--green); font-weight: 700; }
    .nav-btn.inactive .label { color: var(--text-muted); }
    .nav-btn-center {
      background: var(--green); border: none; cursor: pointer;
      width: 52px; height: 52px; border-radius: 50%; margin-top: -18px;
      box-shadow: 0 4px 16px rgba(74,124,89,0.4);
      display: flex; align-items: center; justify-content: center;
    }
    .nav-btn-center .icon { font-size: 24px; }

    /* Detail sheet */
    .detail-overlay {
      position: fixed; inset: 0; z-index: 2000;
      background: rgba(0,0,0,0.3);
    }
    .detail-overlay.hidden { display: none; }
    .detail-sheet {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: white; border-radius: 24px 24px 0 0;
      box-shadow: 0 -4px 30px rgba(0,0,0,0.12);
      max-height: 80vh; overflow-y: auto;
      animation: slideUp 0.3s ease-out;
      -webkit-overflow-scrolling: touch;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .detail-handle {
      display: flex; justify-content: center; padding: 12px 0 4px;
    }
    .detail-handle div { width: 40px; height: 4px; border-radius: 2px; background: var(--border); }
    .detail-close {
      position: absolute; top: 16px; right: 16px;
      width: 32px; height: 32px; border-radius: 50%;
      border: none; background: var(--cream); font-size: 16px; cursor: pointer;
    }
    .detail-body { padding: 8px 24px 100px; }
    .detail-header { display: flex; gap: 14px; margin-bottom: 16px; }
    .detail-icon {
      width: 52px; height: 52px; border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; flex-shrink: 0;
    }
    .detail-title { font-size: 20px; font-weight: 700; margin: 0; }
    .detail-scientific { font-size: 13px; color: var(--text-light); font-style: italic; margin-top: 2px; }
    .badge-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .badge {
      padding: 5px 10px; border-radius: 10px;
      font-size: 12px; font-weight: 600;
    }
    .badge-safe { background: var(--safe-bg); color: var(--safe); }
    .badge-caution { background: var(--caution-bg); color: var(--caution); }
    .badge-danger { background: var(--danger-bg); color: var(--danger); }
    .info-row { display: flex; gap: 8px; margin-bottom: 16px; }
    .info-card {
      flex: 1; padding: 10px 12px; background: var(--cream); border-radius: 12px;
    }
    .info-card .label { font-size: 11px; color: var(--text-muted); margin-bottom: 2px; }
    .info-card .value { font-size: 13px; font-weight: 600; }
    .uses-box {
      padding: 12px 14px; border-radius: 14px; margin-bottom: 16px;
    }
    .uses-box .uses-title { font-size: 12px; font-weight: 700; margin-bottom: 4px; }
    .uses-box p { font-size: 13px; line-height: 1.5; margin: 0; }
    .safety-warning {
      padding: 12px 14px; border-radius: 14px; margin-bottom: 16px;
      background: var(--caution-bg); border: 1px solid #FFE082;
    }
    .comment-section h3 { font-size: 14px; font-weight: 700; margin-bottom: 10px; }
    .comment-item {
      padding: 10px 14px; background: var(--cream); border-radius: 12px;
      margin-bottom: 8px;
    }
    .comment-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .comment-user { font-size: 13px; font-weight: 600; }
    .comment-time { font-size: 11px; color: var(--text-muted); }
    .comment-text { font-size: 13px; line-height: 1.5; }
    .comment-input-wrap {
      display: flex; gap: 8px; margin-top: 12px;
    }
    .comment-input {
      flex: 1; padding: 10px 14px; border-radius: 12px;
      border: 2px solid var(--border); font-size: 13px; outline: none;
    }
    .comment-input:focus { border-color: var(--green); }
    .comment-send {
      padding: 10px 16px; border-radius: 12px; border: none;
      background: var(--green); color: white; font-weight: 700;
      font-size: 13px; cursor: pointer;
    }
    .detail-actions { display: flex; gap: 10px; margin-top: 20px; }
    .action-primary {
      flex: 1; padding: 14px; border-radius: 14px; border: none;
      background: var(--green); color: white; font-size: 14px;
      font-weight: 700; cursor: pointer;
    }
    .action-secondary {
      padding: 14px 18px; border-radius: 14px;
      border: 2px solid var(--border); background: white;
      font-size: 14px; cursor: pointer;
    }
    .added-by {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; background: var(--cream); border-radius: 12px;
      margin-bottom: 16px;
    }
    .added-by-label { font-size: 12px; color: var(--text-muted); }
    .added-by-name { font-size: 13px; font-weight: 600; }

    /* Add spot form */
    .add-form {
      position: fixed; inset: 0; z-index: 3000;
      background: var(--cream);
      overflow-y: auto;
    }
    .add-form.hidden { display: none; }
    .add-form-header {
      background: linear-gradient(135deg, var(--green-dark), var(--green));
      padding: 50px 24px 24px; color: white;
      display: flex; align-items: center; gap: 12px;
    }
    .add-form-header h2 { font-size: 22px; font-weight: 700; }
    .add-form-back {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,0.2); border: none;
      color: white; font-size: 18px; cursor: pointer;
    }
    .add-form-body { padding: 24px; }
    .form-group { margin-bottom: 16px; }
    .form-label { font-size: 14px; font-weight: 600; margin-bottom: 6px; display: block; }
    .form-input {
      width: 100%; padding: 12px 14px; border-radius: 12px;
      border: 2px solid var(--border); font-size: 14px; outline: none;
      background: white;
    }
    .form-input:focus { border-color: var(--green); }
    .form-select {
      width: 100%; padding: 12px 14px; border-radius: 12px;
      border: 2px solid var(--border); font-size: 14px; outline: none;
      background: white; appearance: none;
    }
    .form-select:focus { border-color: var(--green); }
    .category-picker { display: flex; gap: 8px; flex-wrap: wrap; }
    .category-option {
      padding: 10px 16px; border-radius: 12px;
      border: 2px solid var(--border); background: white;
      cursor: pointer; font-size: 13px; font-weight: 600;
      display: flex; align-items: center; gap: 6px;
      transition: all 0.2s;
    }
    .category-option.selected { border-color: var(--green); background: var(--green-light); }
    .property-picker { display: flex; flex-direction: column; gap: 8px; }
    .property-option {
      padding: 12px 16px; border-radius: 12px;
      border: 2px solid var(--border); background: white;
      cursor: pointer; font-size: 13px;
      display: flex; align-items: center; gap: 10px;
      transition: all 0.2s;
    }
    .property-option.selected { border-color: var(--green); background: var(--green-light); }
    .property-option .prop-icon { font-size: 18px; }
    .form-submit {
      width: 100%; padding: 16px; border-radius: 14px; border: none;
      background: var(--green); color: white; font-size: 16px;
      font-weight: 700; cursor: pointer; margin-top: 8px;
    }
    .form-submit:disabled { opacity: 0.5; }

    /* Photo capture */
    .photo-capture-area {
      border: 2px dashed var(--border); border-radius: 16px;
      padding: 20px; text-align: center; cursor: pointer;
      transition: all 0.2s; background: white;
    }
    .photo-capture-area:hover { border-color: var(--green); }
    .photo-capture-area .cam-icon { font-size: 32px; margin-bottom: 8px; }
    .photo-capture-area .cam-label { font-size: 13px; color: var(--text-light); }
    .photo-preview { position: relative; margin-top: 8px; }
    .photo-preview img {
      width: 100%; border-radius: 12px; max-height: 200px;
      object-fit: cover;
    }
    .photo-preview .remove-photo {
      position: absolute; top: 8px; right: 8px;
      width: 28px; height: 28px; border-radius: 50%;
      background: rgba(0,0,0,0.5); color: white; border: none;
      font-size: 14px; cursor: pointer;
    }

    /* Profile photo */
    .profile-avatar-wrap { position: relative; display: inline-block; }
    .profile-avatar-edit {
      position: absolute; bottom: 0; right: -4px;
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--orange); border: 2px solid white;
      color: white; font-size: 12px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .profile-avatar-img {
      width: 72px; height: 72px; border-radius: 50%;
      object-fit: cover; border: 3px solid rgba(255,255,255,0.3);
    }

    /* Profile screen */
    .profile-screen {
      position: fixed; inset: 0; z-index: 3000;
      background: var(--cream); overflow-y: auto;
    }
    .profile-screen.hidden { display: none; }
    .profile-header {
      background: linear-gradient(135deg, var(--green-dark), var(--green));
      padding: 50px 24px 30px; color: white; text-align: center;
      border-radius: 0 0 30px 30px; position: relative;
    }
    .profile-back {
      position: absolute; top: 50px; left: 20px;
      background: rgba(255,255,255,0.2); border: none;
      color: white; width: 36px; height: 36px; border-radius: 50%;
      font-size: 16px; cursor: pointer;
    }
    .profile-avatar {
      width: 72px; height: 72px; border-radius: 50%;
      background: rgba(255,255,255,0.2); margin: 0 auto 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; border: 3px solid rgba(255,255,255,0.4);
    }
    .profile-name { font-size: 22px; font-weight: 700; }
    .profile-location { font-size: 13px; opacity: 0.8; margin-top: 4px; }
    .profile-stats {
      display: flex; gap: 8px; padding: 20px 20px 0; justify-content: center;
    }
    .stat-card {
      flex: 1; text-align: center; padding: 14px 6px;
      background: white; border-radius: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .stat-num { font-size: 20px; font-weight: 800; color: var(--green); }
    .stat-label { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
    .badges-section { padding: 24px 20px; }
    .badges-section h3 { font-size: 16px; font-weight: 700; margin-bottom: 14px; }
    .badge-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; border-radius: 14px; margin-bottom: 8px;
    }
    .badge-item.earned { background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .badge-item.locked { background: #F5F2ED; opacity: 0.45; }
    .badge-icon { font-size: 24px; }
    .badge-name { font-size: 14px; font-weight: 600; }
    .badge-desc { font-size: 12px; color: var(--text-light); }
    .badge-earned { margin-left: auto; font-size: 12px; color: var(--safe); font-weight: 600; }
    .logout-btn {
      margin: 8px 20px 40px; padding: 14px; border-radius: 14px;
      border: 2px solid var(--danger); background: white;
      color: var(--danger); font-size: 14px; font-weight: 600;
      cursor: pointer; width: calc(100% - 40px);
    }

    /* Toast */
    .toast {
      position: fixed; top: 50px; left: 16px; right: 16px; z-index: 5000;
      background: var(--green-dark); color: white; padding: 14px 18px;
      border-radius: 16px; font-size: 13px; font-weight: 600;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      display: flex; align-items: center; gap: 10px;
      animation: slideDown 0.3s ease-out;
    }
    .toast.hidden { display: none; }
    @keyframes slideDown { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    /* Plant Info Card */
    .plant-card-screen {
      position: fixed; inset: 0; z-index: 3500;
      background: var(--cream); overflow-y: auto;
      animation: slideUp 0.3s ease-out;
    }
    .plant-card-hero {
      position: relative; height: 280px; overflow: hidden;
    }
    .plant-card-hero img {
      width: 100%; height: 100%; object-fit: cover;
    }
    .plant-card-hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 50%);
    }
    .plant-card-back {
      position: absolute; top: 44px; left: 16px;
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(0,0,0,0.4); backdrop-filter: blur(8px);
      border: none; color: white; font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .plant-card-confidence {
      position: absolute; top: 44px; right: 16px;
      padding: 6px 14px; border-radius: 20px;
      background: rgba(0,0,0,0.4); backdrop-filter: blur(8px);
      color: white; font-size: 13px; font-weight: 600;
    }
    .plant-card-hero-info {
      position: absolute; bottom: 20px; left: 20px; right: 20px; color: white;
    }
    .plant-card-hero-info h1 {
      font-size: 28px; font-weight: 800; margin-bottom: 4px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .plant-card-hero-info .scientific {
      font-size: 15px; font-style: italic; opacity: 0.85;
    }
    .plant-card-hero-info .family-badge {
      display: inline-block; margin-top: 8px;
      padding: 4px 12px; border-radius: 12px;

    /* Discord banner */
    .discord-btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      margin: 8px 20px; padding: 14px; border-radius: 14px;

    }
    .discord-btn:active { opacity: 0.9; }

    /* Seasonal glow on pins */
    @keyframes seasonGlow {
      0%, 100% { filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)) drop-shadow(0 0 6px rgba(74,155,95,0.4)); }

    .pin-inner.in-season { animation: seasonGlow 2s ease-in-out infinite; }
    .pin-season-badge {
      position: absolute; bottom: -6px; left: 50%;

    .share-card-preview .share-emoji { font-size: 40px; margin-bottom: 8px; }
    .share-card-preview h3 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .share-card-preview p { font-size: 13px; opacity: 0.85; }
    .share-card-preview .share-badge {

    .share-actions { display: flex; gap: 8px; }

    /* Nearby alert banner */

      z-index: 1500; background: white; border-radius: 16px;
      padding: 14px 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      display: flex; align-items: center; gap: 12px;
      animation: slideUp 0.3s ease-out;
      border-left: 4px solid var(--green);

      width: 28px; height: 28px; border-radius: 50%;
      border: none; background: var(--cream); font-size: 14px;
      cursor: pointer;
    }
    .nearby-alert-go {
      padding: 8px 14px; border-radius: 10px; border: none;
      background: var(--green); color: white; font-size: 12px;
      font-weight: 600; cursor: pointer;
    }

<body>
  <div id="app"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    // ============================
    // Supabase config
    // ============================
    const SUPABASE_URL = 'https://algqrxkvxlsgxwbpgopi.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFsZ3FyeGt2eGxzZ3h3YnBnb3BpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwODcyNjYsImV4cCI6MjA5MDY2MzI2Nn0.bIFMgsGqvz0cuDgzkYsV0G5jzarTsIfol4yFg-I1ssE';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ============================
    // App State
    // ============================
    let state = {
      screen: 'splash', // splash, auth, map
      authMode: 'signup', // signup, login
      user: null,
      spots: [],
      selectedSpot: null,
      comments: [],
      filters: { fruit: true, herb: true, flower: true, other: true },
      showAddForm: false,
      showProfile: false,
      toast: null,
      loading: false,
      userLocation: { lat: 34.0782, lng: -118.2606 }, // Default: Echo Park
      spotPhoto: null, // base64 photo for new spot
      profilePhoto: null, // base64 profile photo
      harvests: [], // harvest log entries for selected spot
      nearbyAlert: null, // { spot, distance } for nearby notification
      shareSpot: null, // spot being shared
      dismissedAlerts: new Set(), // spot IDs user dismissed
      plantIdResult: null, // result from plant ID API
      plantInfo: null, // Wikipedia info about identified plant
      identifyingPlant: false, // loading state for plant ID
      discordUrl: '', // Discord invite URL (set after creation)
    };

    let map = null;
    let markers = [];

    // ============================
    // Database setup (runs once to create tables if needed)
    // ============================
    async function ensureTables() {
      // Create follows table
      await supabase.rpc('exec_sql', { sql: `
        CREATE TABLE IF NOT EXISTS follows (
          id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
          follower_id UUID REFERENCES auth.users(id) ON DELETE CASCADE,
          following_id UUID REFERENCES auth.users(id) ON DELETE CASCADE,
          created_at TIMESTAMPTZ DEFAULT NOW(),
          UNIQUE(follower_id, following_id)
        );
      `}).catch(() => {});
      // We'll handle table creation errors silently — tables may already exist or RPC may not be available
    }

    // ============================
    // Category config
    // ============================
    const CATEGORIES = {
      fruit: { icon: '🍊', label: 'Fruit', color: '#E8863A', lightBg: 'var(--orange-light)', pinColor: '#E8863A' },
      herb: { icon: '🌿', label: 'Herbs', color: '#4A7C59', lightBg: 'var(--green-light)', pinColor: '#4A7C59' },
      flower: { icon: '🌸', label: 'Flowers', color: '#D4728C', lightBg: 'var(--pink-light)', pinColor: '#D4728C' },
      other: { icon: '🍄', label: 'Other', color: '#8B6F47', lightBg: 'var(--brown-light)', pinColor: '#8B6F47' },
    };

    const PROPERTY_TYPES = {
      public: { icon: '🌳', label: 'Public land' },
      overhanging: { icon: '🏡', label: 'Overhanging to sidewalk' },
      homeowner: { icon: '🎁', label: 'Homeowner shared' },
    };

    const STATUS_CONFIG = {
      plenty: { label: 'Plenty available', color: 'var(--safe)', bg: 'var(--safe-bg)' },
      some: { label: 'Some left', color: 'var(--caution)', bg: 'var(--caution-bg)' },
      picked: { label: 'Picked over', color: 'var(--danger)', bg: 'var(--danger-bg)' },
    };

    const SAFETY_CONFIG = {
      safe: { icon: '✅', label: 'Safe to forage', cssClass: 'badge-safe' },
      caution: { icon: '⚠️', label: 'Use caution', cssClass: 'badge-caution' },
      toxic: { icon: '❌', label: 'Toxic — Do not eat', cssClass: 'badge-danger' },
    };

    const BADGES = [
      { icon: '🌱', name: 'First Find', desc: 'Found your first forage spot' },
      { icon: '🗺️', name: 'Trailblazer', desc: 'Added 5 new spots' },
      { icon: '🚶', name: 'Wanderer', desc: 'Walked 10 miles foraging' },
      { icon: '🍋', name: 'Citrus Scout', desc: 'Found 10 citrus trees' },
      { icon: '🫖', name: 'Tea Time', desc: 'Foraged 5 tea plants' },
      { icon: '🌸', name: 'Petal Pusher', desc: 'Found 10 flower spots' },
      { icon: '🎁', name: 'Good Neighbor', desc: 'Shared from your yard' },
      { icon: '👀', name: 'Eagle Eye', desc: 'Reported 5 corrections' },
      { icon: '🏆', name: 'LoFo Legend', desc: 'All badges earned' },
    ];

    // ============================
    // Check if user is already signed in
    // ============================
    async function checkAuth() {
      // Load saved profile photo
      const savedPhoto = localStorage.getItem('lofo_profile_photo');
      if (savedPhoto) state.profilePhoto = savedPhoto;

      const { data: { session } } = await supabase.auth.getSession();
      if (session) {
        state.user = session.user;
        state.screen = 'map';
        render();
        initMap();
        loadSpots();
      }
    }

    // ============================
    // Auth
    // ============================
    async function handleAuth(e) {
      e.preventDefault();
      const form = e.target;
      const email = form.email.value;
      const password = form.password.value;
      const name = form.displayName?.value || '';

      state.loading = true;
      render();

      let result;
      if (state.authMode === 'signup') {
        result = await supabase.auth.signUp({
          email,
          password,
          options: { data: { display_name: name } }
        });
      } else {
        result = await supabase.auth.signInWithPassword({ email, password });
      }

      state.loading = false;

      if (result.error) {
        document.getElementById('auth-error').textContent = result.error.message;
        document.getElementById('auth-error').style.display = 'block';
        render();
        return;
      }

      state.user = result.data.user;
      state.screen = 'map';
      render();
      initMap();
      loadSpots();
      showToast('Welcome to LoFo! 🌿');
    }

    async function logout() {
      await supabase.auth.signOut();
      state.user = null;
      state.screen = 'auth';
      state.showProfile = false;
      if (map) { map.remove(); map = null; }
      render();
    }

    // ============================
    // Data
    // ============================
    async function loadSpots() {
      const { data, error } = await supabase
        .from('spots')
        .select('*')
        .order('created_at', { ascending: false });

      if (data) {
        state.spots = data;
        updateMapPins();
        renderSeasonalFeed();
      }
    }

    async function addSpot(spotData) {
      const { data, error } = await supabase
        .from('spots')
        .insert([{
          ...spotData,
          user_id: state.user.id,
          user_name: getUsername(),
        }])
        .select();

      if (error) {
        showToast('Error adding spot: ' + error.message);
        return;
      }

      state.spots.unshift(data[0]);
      state.showAddForm = false;
      state.spotPhoto = null;
      state.plantIdResult = null;
      updateMapPins();
      // Remove form without full re-render
      document.getElementById('add-form-screen')?.remove();
      bumpStreak();
      renderSeasonalFeed();
      showToast('New forage spot added! 🌱');
    }

    async function loadComments(spotId) {
      const { data } = await supabase
        .from('comments')
        .select('*')
        .eq('spot_id', spotId)
        .order('created_at', { ascending: true });

      state.comments = data || [];
      renderDetailSheet();
    }

    async function addComment(spotId, text) {
      const userName = getUsername();
      const { data, error } = await supabase
        .from('comments')
        .insert([{
          spot_id: spotId,
          user_id: state.user.id,
          user_name: userName,
          text: text,
        }])
        .select();

      if (data) {
        state.comments.push(data[0]);
        renderDetailSheet();
      }
    }

    async function updateSpotStatus(spotId, newStatus) {
      await supabase
        .from('spots')
        .update({ status: newStatus })
        .eq('id', spotId);

      const spot = state.spots.find(s => s.id === spotId);
      if (spot) spot.status = newStatus;
      if (state.selectedSpot?.id === spotId) state.selectedSpot.status = newStatus;
      renderDetailSheet();
    }

    // ============================
    // Harvest Log
    // ============================
    async function logHarvest(spotId) {
      const userName = getUsername();
      const { data, error } = await supabase
        .from('harvests')
        .insert([{ spot_id: spotId, user_id: state.user.id, user_name: userName }])
        .select();

      if (error) {
        showToast('Error logging harvest: ' + error.message);
        return;
      }

      if (data) state.harvests.unshift(data[0]);
      renderDetailSheet();
      bumpStreak();
      showToast('Harvest logged! 🧺');

      // Auto-update status if many recent harvests
      if (state.harvests.length >= 5) {
        updateSpotStatus(spotId, 'picked');
      } else if (state.harvests.length >= 2) {
        updateSpotStatus(spotId, 'some');
      }
    }

    async function loadHarvests(spotId) {
      const { data } = await supabase
        .from('harvests')
        .select('*')
        .eq('spot_id', spotId)
        .order('created_at', { ascending: false })
        .limit(10);
      state.harvests = data || [];
    }

    // ============================
    // Nearby Alerts
    // ============================
    function startNearbyAlerts() {
      if (!navigator.geolocation) return;

      navigator.geolocation.watchPosition((pos) => {
        state.userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };

        // Update user dot on map
        if (map) {
          map.eachLayer(layer => {
            if (layer instanceof L.CircleMarker && layer.options.className === 'user-dot') {
              layer.setLatLng([state.userLocation.lat, state.userLocation.lng]);
            }
          });
        }

        // Check nearby in-season spots
        const nearbyThreshold = 200; // meters
        for (const spot of state.spots) {
          if (state.dismissedAlerts.has(spot.id)) continue;
          if (!isInSeason(spot.season) && !spot.ripe_now) continue;

          const dist = getDistance(state.userLocation.lat, state.userLocation.lng, spot.lat, spot.lng);
          if (dist < nearbyThreshold) {
            state.nearbyAlert = { spot, distance: Math.round(dist) };
            renderNearbyAlert();
            return;
          }
        }
      }, () => {}, { enableHighAccuracy: true, maximumAge: 10000, timeout: 5000 });
    }

    function renderNearbyAlert() {
      const existing = document.getElementById('nearby-alert');
      if (existing) existing.remove();

      if (!state.nearbyAlert) return;
      const { spot, distance } = state.nearbyAlert;
      const cat = CATEGORIES[spot.category] || CATEGORIES.other;

      const el = document.createElement('div');
      el.className = 'nearby-alert';
      el.id = 'nearby-alert';
      el.innerHTML = `
        <div class="nearby-alert-icon">${cat.icon}</div>
        <div class="nearby-alert-info">
          <div class="nearby-alert-title">${spot.plant_name} nearby!</div>
          <div class="nearby-alert-dist">${distance}m away · ${isInSeason(spot.season) ? '✨ In season now' : '🟢 Ripe'}</div>
        </div>
        <button class="nearby-alert-go" id="nearby-go">Go</button>
        <button class="nearby-alert-close" id="nearby-dismiss">✕</button>
      `;
      document.body.appendChild(el);

      document.getElementById('nearby-go')?.addEventListener('click', () => {
        state.selectedSpot = spot;
        loadComments(spot.id);
        loadHarvests(spot.id);
        render();
        el.remove();
        state.nearbyAlert = null;
      });
      document.getElementById('nearby-dismiss')?.addEventListener('click', () => {

        el.remove();
      });

      // Auto-dismiss after 10 seconds
      setTimeout(() => {
        if (document.getElementById('nearby-alert')) {
          el.remove();
          state.nearbyAlert = null;
        }
      }, 10000);
    }

    // ============================
    // Plant ID (PlantNet API)
    // ============================
    async function identifyPlant(base64Image) {
      state.identifyingPlant = true;
      state.plantIdResult = null;

      try {
        // Convert base64 to blob for PlantNet
        const blobResp = await fetch(base64Image);
        const blob = await blobResp.blob();

        const formData = new FormData();
        formData.append('images', blob, 'plant.jpg');
        formData.append('organs', 'auto');

        // PlantNet free API — 500 requests/day
        // Get your key at https://my.plantnet.org/
        const PLANTNET_KEY = '2b10qVWfBJksdgVIQMQEWdIDu';
        const apiUrl = `https://my-api.plantnet.org/v2/identify/all?include-related-images=false&no-reject=false&nb-results=3&lang=en&type=kt&api-key=${PLANTNET_KEY}`;

        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 15000);

        const result = await fetch(apiUrl, {
          method: 'POST',
          body: formData,
          signal: controller.signal,
        });
        clearTimeout(timeout);

        const data = await result.json();
        state.identifyingPlant = false;

        if (data.results && data.results.length > 0) {
          const top = data.results[0];
          const species = top.species;
          state.plantIdResult = {
            commonName: species.commonNames?.[0] || species.scientificNameWithoutAuthor,
            scientificName: species.scientificNameWithoutAuthor,
            family: species.family?.scientificNameWithoutAuthor || '',
            score: Math.round(top.score * 100),
          };
          return; // Success — form will be filled by openAddFormWithData
        }
      } catch (err) {
        // Silently fail — user can still fill manually
      }
      state.identifyingPlant = false;
    }

    function applyPlantIdToForm() {
      if (!state.plantIdResult) return;

      const nameInput = document.querySelector('input[name="plant_name"]');
      const sciInput = document.querySelector('input[name="scientific_name"]');
      if (nameInput && state.plantIdResult.commonName) {
        nameInput.value = state.plantIdResult.commonName;
      }
      if (sciInput && state.plantIdResult.scientificName) {
        sciInput.value = state.plantIdResult.scientificName;
      }

      // Guess category
      const family = (state.plantIdResult.family || '').toLowerCase();
      const name = (state.plantIdResult.commonName || '').toLowerCase();
      let guessedCategory = null;
      if (['rosaceae','rutaceae','moraceae','vitaceae','sapindaceae','musaceae','cucurbitaceae'].includes(family) ||
          name.includes('fruit') || name.includes('berry') || name.includes('lemon') || name.includes('orange') || name.includes('apple') || name.includes('fig')) {
        guessedCategory = 'fruit';
      } else if (['lamiaceae','apiaceae','amaryllidaceae'].includes(family) ||
          name.includes('mint') || name.includes('basil') || name.includes('rosemary') || name.includes('herb') || name.includes('sage') || name.includes('thyme')) {
        guessedCategory = 'herb';
      } else if (name.includes('flower') || name.includes('rose') || name.includes('lily') || name.includes('daisy') || name.includes('lavender') || name.includes('hibiscus')) {
        guessedCategory = 'flower';
      }

      if (guessedCategory) {
        document.querySelectorAll('.category-option').forEach(o => o.classList.remove('selected'));
        const catOpt = document.querySelector(`[data-cat="${guessedCategory}"]`);
        if (catOpt) {
          catOpt.classList.add('selected');
          document.getElementById('add-category').value = guessedCategory;
        }
      }

      showToast(`Identified: ${state.plantIdResult.commonName} (${state.plantIdResult.score}% match) 🔍`);
    }

    function handleQuickCamera(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (ev) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const maxSize = 800;
          let w = img.width, h = img.height;
          if (w > h) { if (w > maxSize) { h *= maxSize / w; w = maxSize; } }
          else { if (h > maxSize) { w *= maxSize / h; h = maxSize; } }
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          state.spotPhoto = canvas.toDataURL('image/jpeg', 0.7);

          // Auto-get location
          if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
              (pos) => {
                state._pendingLat = pos.coords.latitude.toFixed(6);
                state._pendingLng = pos.coords.longitude.toFixed(6);
              },
              () => {}
            );
          }

          // Show the plant card screen with loading state immediately
          showPlantCard(null, true);

          // Try to identify plant
          identifyPlant(state.spotPhoto).then(() => {
            if (state.plantIdResult) {
              // Fetch Wikipedia info then show card
              fetchPlantInfo(state.plantIdResult.commonName, state.plantIdResult.scientificName).then(info => {
                state.plantInfo = info;
                showPlantCard(state.plantIdResult, false);
              });
            } else {
              // Couldn't identify — go straight to add form
              showPlantCard(null, false);
            }
          }).catch(() => {
            showPlantCard(null, false);
          });
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    }

    // ============================
    // Wikipedia Plant Info Lookup
    // ============================
    async function fetchPlantInfo(commonName, scientificName) {
      const info = { summary: '', edible: '', uses: [], facts: [], medicinal: '', season: '' };
      try {
        // Try scientific name first (more accurate), then common name
        const searchTerms = [scientificName, commonName].filter(Boolean);
        let pageData = null;

        for (const term of searchTerms) {
          const searchUrl = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(term)}`;
          const resp = await fetch(searchUrl);
          if (resp.ok) {
            const data = await resp.json();
            if (data.extract && data.extract.length > 50) {
              pageData = data;
              break;
            }
          }
          // Try search API as fallback
          const searchResp = await fetch(`https://en.wikipedia.org/w/api.php?action=opensearch&search=${encodeURIComponent(term)}&limit=1&format=json&origin=*`);
          if (searchResp.ok) {
            const searchData = await searchResp.json();
            if (searchData[1] && searchData[1][0]) {
              const pageResp = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(searchData[1][0])}`);
              if (pageResp.ok) {
                pageData = await pageResp.json();
                if (pageData.extract && pageData.extract.length > 50) break;
              }
            }
          }
        }

        if (pageData?.extract) {
          info.summary = pageData.extract;

          // Parse edibility from text
          const text = pageData.extract.toLowerCase();
          if (text.includes('edible') || text.includes('eaten') || text.includes('food') || text.includes('culinary') || text.includes('cooking') || text.includes('eaten raw')) {
            info.edible = 'edible';
          } else if (text.includes('toxic') || text.includes('poison') || text.includes('harmful') || text.includes('dangerous')) {
            info.edible = 'toxic';
          } else if (text.includes('medicin') || text.includes('herbal') || text.includes('remedy')) {
            info.edible = 'medicinal';
          }

          // Extract uses
          if (text.includes('tea') || text.includes('infusion')) info.uses.push('Tea & infusions');
          if (text.includes('cook') || text.includes('recipe') || text.includes('culinary')) info.uses.push('Cooking');
          if (text.includes('jam') || text.includes('preserve') || text.includes('jelly')) info.uses.push('Jams & preserves');
          if (text.includes('salad') || text.includes('raw')) info.uses.push('Salads');
          if (text.includes('medicin') || text.includes('remedy') || text.includes('treat')) info.uses.push('Traditional medicine');
          if (text.includes('ornament') || text.includes('decorat') || text.includes('garden')) info.uses.push('Ornamental');
          if (text.includes('dye') || text.includes('fiber') || text.includes('craft')) info.uses.push('Crafts & dyes');
          if (text.includes('essential oil') || text.includes('fragran') || text.includes('perfum')) info.uses.push('Aromatherapy');

          // Extract season info
          const seasonPatterns = [
            /fruits?\s+(?:in|from|during)\s+([\w]+(?:\s*(?:to|through|–|-)\s*[\w]+)?)/i,
            /harvest(?:ed)?\s+(?:in|from|during)\s+([\w]+(?:\s*(?:to|through|–|-)\s*[\w]+)?)/i,
            /bloom(?:s|ing)?\s+(?:in|from|during)\s+([\w]+(?:\s*(?:to|through|–|-)\s*[\w]+)?)/i,
            /ripen(?:s|ing)?\s+(?:in|from|during)\s+([\w]+(?:\s*(?:to|through|–|-)\s*[\w]+)?)/i,
            /(spring|summer|autumn|fall|winter|year[- ]round)/i,
          ];
          for (const pat of seasonPatterns) {
            const match = text.match(pat);
            if (match) { info.season = match[1].trim(); break; }
          }
          // Guess season from common knowledge if still empty
          const nameLower = (commonName || '').toLowerCase();
          if (!info.season) {
            if (nameLower.includes('lemon') || nameLower.includes('orange') || nameLower.includes('citrus') || nameLower.includes('grapefruit')) info.season = 'Dec–Apr';
            else if (nameLower.includes('berry') || nameLower.includes('blackberry') || nameLower.includes('raspberry')) info.season = 'Jun–Aug';
            else if (nameLower.includes('apple') || nameLower.includes('pear') || nameLower.includes('plum')) info.season = 'Aug–Oct';
            else if (nameLower.includes('fig')) info.season = 'Jun–Sep';
            else if (nameLower.includes('cherry')) info.season = 'May–Jul';
            else if (nameLower.includes('rosemary') || nameLower.includes('mint') || nameLower.includes('basil')) info.season = 'Year-round';
            else if (nameLower.includes('lavender') || nameLower.includes('elderflower')) info.season = 'Jun–Aug';
          }

          // Extract interesting facts
          const sentences = pageData.extract.split(/\.\s+/);
          for (const s of sentences) {
            if (s.length > 30 && s.length < 200) {
              const lower = s.toLowerCase();
              if (lower.includes('native to') || lower.includes('origin') || lower.includes('found in') || lower.includes('grows in')) {
                info.facts.push(s.trim() + '.');
              } else if (lower.includes('also known') || lower.includes('commonly called') || lower.includes('sometimes called')) {
                info.facts.push(s.trim() + '.');
              } else if (lower.includes('century') || lower.includes('ancient') || lower.includes('traditional') || lower.includes('history')) {
                info.facts.push(s.trim() + '.');
              } else if (lower.includes('species') || lower.includes('family') || lower.includes('genus')) {
                info.facts.push(s.trim() + '.');
              }
            }
          }
          // Limit facts to 3
          info.facts = info.facts.slice(0, 3);
          if (info.facts.length === 0 && sentences.length > 1) {
            info.facts.push(sentences[0].trim() + '.');
          }
        }
      } catch (err) {
        // Silently fail — card will show with basic info
      }
      return info;
    }

    function openAddFormWithData() {

    // ============================
    // Route Mode (Tap markers to build walking route)
    // ============================
    let routeMode = false;
    let routeSpots = [];
    let routePolyline = null;
    let routeMarkerBadges = [];

    function toggleRouteMode() {
      if (routeMode) {
        exitRouteMode();
      } else {
        enterRouteMode();
      }
    }

    function enterRouteMode() {
      routeMode = true;
      routeSpots = [];
      showToast('Tap pins to build your foraging route \uD83D\uDEB6');
      renderRouteBanner();
      // Hide search bar and filter bar
      document.querySelector('.search-bar')?.style && (document.querySelector('.search-bar').style.display = 'none');
      document.querySelector('.filter-bar')?.style && (document.querySelector('.filter-bar').style.display = 'none');
      document.querySelector('.spot-count')?.style && (document.querySelector('.spot-count').style.display = 'none');
    }

    function exitRouteMode() {
      routeMode = false;
      routeSpots = [];
      // Remove route line
      if (routePolyline && map) { map.removeLayer(routePolyline); routePolyline = null; }
      // Remove numbered badges
      routeMarkerBadges.forEach(b => { if (map) map.removeLayer(b); });
      routeMarkerBadges = [];
      // Remove banner
      document.getElementById('route-banner')?.remove();
      // Show search and filter bars again
      document.querySelector('.search-bar')?.style && (document.querySelector('.search-bar').style.display = '');
      document.querySelector('.filter-bar')?.style && (document.querySelector('.filter-bar').style.display = '');
      document.querySelector('.spot-count')?.style && (document.querySelector('.spot-count').style.display = '');
    }

    function addSpotToRoute(spot) {
      if (!routeMode) return;

      // Toggle: if already in route, remove it
      const idx = routeSpots.findIndex(s => s.id === spot.id);
      if (idx >= 0) {
        routeSpots.splice(idx, 1);
      } else {
        routeSpots.push(spot);
      }
      updateRouteLine();
      renderRouteBanner();
    }

    function updateRouteLine() {
      if (!map) return;

      // Remove old line
      if (routePolyline) { map.removeLayer(routePolyline); routePolyline = null; }
      // Remove old badges
      routeMarkerBadges.forEach(b => map.removeLayer(b));
      routeMarkerBadges = [];

      if (routeSpots.length < 1) return;

      // Draw polyline
      const latlngs = routeSpots.map(s => [s.lat, s.lng]);
      routePolyline = L.polyline(latlngs, {
        color: '#2D5A3D',
        weight: 4,
        opacity: 0.8,
        dashArray: '10, 8',
        lineJoin: 'round',
      }).addTo(map);

      // Add numbered badges to each spot
      routeSpots.forEach((spot, i) => {
        const badge = L.marker([spot.lat, spot.lng], {
          icon: L.divIcon({
            className: '',
            iconSize: [22, 22],
            iconAnchor: [11, 34],
            html: `<div class="route-marker-badge">${i + 1}</div>`,
          }),
          interactive: false,
          zIndexOffset: 1000,
        }).addTo(map);
        routeMarkerBadges.push(badge);
      });

      // Fit map to route
      if (routeSpots.length >= 2) {
        map.fitBounds(routePolyline.getBounds(), { padding: [60, 60] });
      }
    }

    function getRouteTotalDistance() {
      let total = 0;
      for (let i = 1; i < routeSpots.length; i++) {
        total += getDistance(routeSpots[i-1].lat, routeSpots[i-1].lng, routeSpots[i].lat, routeSpots[i].lng);
      }
      return total;
    }

    function renderRouteBanner() {
      document.getElementById('route-banner')?.remove();

      if (!routeMode) return;

      const dist = getRouteTotalDistance();
      const distText = dist > 1000 ? `${(dist/1000).toFixed(1)} km` : `${Math.round(dist)} m`;
      const walkTime = Math.max(1, Math.round(dist / 80)); // ~80m/min walking

      const banner = document.createElement('div');
      banner.className = 'route-banner';
      banner.id = 'route-banner';
      banner.innerHTML = `
        <div style="font-size:24px">\uD83D\uDEB6</div>
        <div class="route-banner-info">
          <div class="route-banner-title">${routeSpots.length === 0 ? 'Tap pins to add to route' : `${routeSpots.length} stop${routeSpots.length > 1 ? 's' : ''}`}</div>
          <div class="route-banner-stats">${routeSpots.length >= 2 ? `${distText} \u00B7 ~${walkTime} min walk` : 'Add at least 2 stops'}</div>
        </div>
        <div class="route-banner-actions">
          ${routeSpots.length >= 2 ? '<button class="route-done-btn" id="route-go">\uD83D\uDDFA\uFE0F Go</button>' : ''}
          <button class="route-clear-btn" id="route-exit">\u2715</button>
        </div>
      `;
      document.body.appendChild(banner);

      document.getElementById('route-exit')?.addEventListener('click', exitRouteMode);
      document.getElementById('route-go')?.addEventListener('click', () => {
        // Open Google Maps with waypoints
        if (routeSpots.length < 2) return;
        const origin = `${routeSpots[0].lat},${routeSpots[0].lng}`;
        const destination = `${routeSpots[routeSpots.length-1].lat},${routeSpots[routeSpots.length-1].lng}`;
        const waypoints = routeSpots.slice(1, -1).map(s => `${s.lat},${s.lng}`).join('|');
        let url = `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${destination}&travelmode=walking`;
        if (waypoints) url += `&waypoints=${waypoints}`;
        window.open(url, '_blank');
      });
    }

    function getUniqueForagers() {
      const foragers = {};
      state.spots.forEach(s => {
        if (!foragers[s.user_id]) {
          foragers[s.user_id] = { id: s.user_id, name: s.user_name, spots: 0 };
        }
        foragers[s.user_id].spots++;
      });
      return Object.values(foragers).sort((a, b) => b.spots - a.spots);
    }

    // ============================
    // Foraging Streak
    // ============================
    function getStreak() {
      const streakData = JSON.parse(localStorage.getItem('lofo_streak') || '{"count":0,"lastDate":""}');
      const today = new Date().toDateString();
      const yesterday = new Date(Date.now() - 86400000).toDateString();

      if (streakData.lastDate === today) return streakData;
      if (streakData.lastDate === yesterday) return streakData; // streak alive but not yet logged today
      if (streakData.lastDate !== today && streakData.lastDate !== yesterday) {
        return { count: 0, lastDate: '' }; // streak broken
      }
      return streakData;
    }

    function bumpStreak() {
      const streakData = getStreak();
      const today = new Date().toDateString();
      if (streakData.lastDate === today) return streakData; // already bumped today

      streakData.count++;
      streakData.lastDate = today;
      localStorage.setItem('lofo_streak', JSON.stringify(streakData));
      if (streakData.count > 1) {
        showToast(`🔥 ${streakData.count} day streak!`);
      }
      return streakData;
    }

    // ============================
    // Leaderboard
    // ============================
    function getLeaderboard() {
      const scores = {};
      state.spots.forEach(s => {
        if (!scores[s.user_name]) scores[s.user_name] = 0;
        scores[s.user_name] += 10; // 10 pts per spot added
      });
      return Object.entries(scores)
        .map(([name, score]) => ({ name, score }))
        .sort((a, b) => b.score - a.score)
        .slice(0, 10);
    }

    // ============================
    // Map
    // ============================
    function initMap() {
      if (map) return;

      // Try to get user's real location
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            state.userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            if (map) map.setView([state.userLocation.lat, state.userLocation.lng], 15);
          },
          () => {} // Fail silently, use default
        );
      }

      setTimeout(() => {
        map = L.map('map', {
          zoomControl: false,
          attributionControl: false,
        }).setView([state.userLocation.lat, state.userLocation.lng], 15);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
          maxZoom: 19,
        }).addTo(map);

        // User location marker
        L.circleMarker([state.userLocation.lat, state.userLocation.lng], {
          radius: 8, color: '#4A90D9', fillColor: '#4A90D9',
          fillOpacity: 1, weight: 3, opacity: 1,
          className: 'user-dot',
        }).addTo(map);

        // Listen for map clicks when adding
        map.on('click', (e) => {
          if (state.showAddForm) {
            document.getElementById('add-lat').value = e.latlng.lat.toFixed(6);
            document.getElementById('add-lng').value = e.latlng.lng.toFixed(6);
          }
        });

        updateMapPins();
      }, 100);
    }

    // Check if a spot is currently in season based on its season text
    function isInSeason(seasonText) {
      if (!seasonText) return false;
      const s = seasonText.toLowerCase().trim();
      if (s === 'year-round' || s === 'year round' || s === 'all year') return true;
      const monthMap = { jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11,
        january:0,february:1,march:2,april:3,june:5,july:6,august:7,september:8,october:9,november:10,december:11 };
      const now = new Date().getMonth();
      // Try to parse "Mar–Sep" or "March-September" style
      const rangeMatch = s.match(/([a-z]+)\s*[–\-—to]+\s*([a-z]+)/i);
      if (rangeMatch) {
        const start = monthMap[rangeMatch[1].toLowerCase().slice(0,3)];
        const end = monthMap[rangeMatch[2].toLowerCase().slice(0,3)];
        if (start !== undefined && end !== undefined) {
          if (start <= end) return now >= start && now <= end;
          else return now >= start || now <= end; // wraps around year
        }
      }
      // Check if any month name appears in the text
      for (const [key, val] of Object.entries(monthMap)) {
        if (s.includes(key) && val === now) return true;
      }
      return false;
    }

    // Calculate distance between two lat/lng points in meters
    function getDistance(lat1, lng1, lat2, lng2) {
      const R = 6371000;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function createPinIcon(category, ripeNow, season) {
      const cat = CATEGORIES[category] || CATEGORIES.other;
      const inSeason = isInSeason(season);
      return L.divIcon({
        className: 'lofo-pin',
        iconSize: [36, 44],
        iconAnchor: [18, 44],
        popupAnchor: [0, -44],
        html: `
          <div class="pin-inner ${inSeason ? 'in-season' : ''}">
            <svg width="36" height="44" viewBox="0 0 32 40">
              <path d="M16 0C7.16 0 0 7.16 0 16c0 12 16 24 16 24s16-12 16-24C32 7.16 24.84 0 16 0z" fill="${cat.pinColor}" />
            </svg>
            <span class="pin-emoji">${cat.icon}</span>
            ${ripeNow ? '<span class="pin-ripe">RIPE</span>' : ''}
            ${inSeason && !ripeNow ? '<span class="pin-season-badge">IN SEASON</span>' : ''}
          </div>
        `,
      });
    }

    function updateMapPins() {
      if (!map) return;

      // Remove old markers
      markers.forEach(m => map.removeLayer(m));
      markers = [];

      const filtered = state.spots.filter(s => state.filters[s.category]);

      filtered.forEach(spot => {
        const icon = createPinIcon(spot.category, spot.ripe_now, spot.season);
        const marker = L.marker([spot.lat, spot.lng], { icon })
          .addTo(map)
          .on('click', () => {
            // Route mode: add/remove spot from route
            if (routeMode) {
              addSpotToRoute(spot);
              return;
            }
            state.selectedSpot = spot;
            loadComments(spot.id);
            loadHarvests(spot.id);
            const container = document.getElementById('detail-container');
            if (container) {
              container.innerHTML = renderDetailOverlay();
              setupDetailListeners();
            }
          });
        markers.push(marker);
      });

      // Update spot count
      const countEl = document.getElementById('spot-count');
      if (countEl) countEl.textContent = `${filtered.length} spots nearby`;
    }

    // ============================
    // Rendering
    // ============================
    let mapScreenInitialized = false;

    function render() {
      const app = document.getElementById('app');

      if (state.screen === 'splash') {
        mapScreenInitialized = false;
        app.innerHTML = renderSplash();
        return;
      }

      if (state.screen === 'auth') {
        mapScreenInitialized = false;
        app.innerHTML = renderAuth();
        setupAuthListeners();
        return;
      }

      // Map screen — only build the base once, then manage overlays
      if (!mapScreenInitialized) {
        app.innerHTML = `
          <div id="map"></div>
          ${renderSearchBar()}
          <div class="spot-count" id="spot-count">${getFilteredSpots().length} spots nearby</div>
          <div id="seasonal-feed-container"></div>
          ${renderFilterBar()}
          ${renderBottomNav()}
          <div id="detail-container"></div>
          <div id="overlay-container"></div>
          <input type="file" accept="image/*" capture="environment" id="quick-camera-input" style="display:none">
        `;
        mapScreenInitialized = true;
        setupMapListeners();
      } else {
        // Update dynamic parts without destroying map
        const countEl = document.getElementById('spot-count');
        if (countEl) countEl.textContent = `${getFilteredSpots().length} spots nearby`;
      }

      // Manage overlays independently
      const detailContainer = document.getElementById('detail-container');
      if (detailContainer) {
        detailContainer.innerHTML = state.selectedSpot ? renderDetailOverlay() : '';

        if (state.showProfile) overlayHTML += renderProfile();
        overlayContainer.innerHTML = overlayHTML;
        if (state.showAddForm) setupAddFormListeners();
        if (state.showProfile) setupProfileListeners();

    function renderSeasonalFeed() {
      const container = document.getElementById('seasonal-feed-container');
      if (!container) return;

      const inSeasonSpots = state.spots.filter(s => isInSeason(s.season) || s.ripe_now);
      if (inSeasonSpots.length === 0) {
        container.innerHTML = '';
        return;
      }

      // Deduplicate by plant name
      const seen = new Set();
      const unique = inSeasonSpots.filter(s => {
        const key = s.plant_name.toLowerCase();
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      }).slice(0, 8);

      container.innerHTML = `
        <div class="seasonal-feed">
          <div class="seasonal-feed-inner">
            <div class="seasonal-chip" style="background:var(--green);color:white;cursor:default">
              <span>✨</span> In Season Now
            </div>
            ${unique.map(s => {
              const cat = CATEGORIES[s.category] || CATEGORIES.other;
              return `
                <div class="seasonal-chip glowing" data-spot-id="${s.id}">
                  <span class="chip-emoji">${cat.icon}</span>
                  <span>${s.plant_name}</span>
                </div>
              `;
            }).join('')}
          </div>
        </div>

      // Click to pan to spot

          const spot = state.spots.find(s => s.id === chip.dataset.spotId);

            state.selectedSpot = spot;
            loadComments(spot.id);
            loadHarvests(spot.id);

              setupDetailListeners();
            }

        });
      });

    function renderFilterBar() {

        { key: 'herb', icon: '🌿', label: 'Herbs', color: 'var(--green)', bg: 'var(--green-light)' },
        { key: 'flower', icon: '🌸', label: 'Flowers', color: 'var(--pink)', bg: 'var(--pink-light)' },
        { key: 'other', icon: '🍄', label: 'Other', color: 'var(--brown)', bg: 'var(--brown-light)' },
      ];

      return `
        <div class="filter-bar">
          <div class="filter-bar-inner">
            ${filters.map(f => `
              <button class="filter-btn ${state.filters[f.key] ? 'active' : 'inactive'}"
                      data-filter="${f.key}"

    function setupAuthListeners() {
      document.getElementById('auth-form')?.addEventListener('submit', handleAuth);

    function setupMapListeners() {
      // Filters
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const key = btn.dataset.filter;
          state.filters[key] = !state.filters[key];
          // Update filter button styles without re-rendering
          btn.classList.toggle('active');
          btn.classList.toggle('inactive');
          const f = [
            { key: 'fruit', color: 'var(--orange)', bg: 'var(--orange-light)' },
            { key: 'herb', color: 'var(--green)', bg: 'var(--green-light)' },
            { key: 'flower', color: 'var(--pink)', bg: 'var(--pink-light)' },
            { key: 'other', color: 'var(--brown)', bg: 'var(--brown-light)' },
          ].find(x => x.key === key);
          if (state.filters[key] && f) {
            btn.style.background = f.bg;
            btn.style.color = f.color;
          } else {
            btn.style.background = '';
            btn.style.color = '';
          }
          updateMapPins();
        });
      });

      // Nav camera button — opens camera directly
      document.getElementById('nav-add')?.addEventListener('click', () => {
        triggerQuickCamera();
      });

      // Quick camera input handler
      document.getElementById('quick-camera-input')?.addEventListener('change', handleQuickCamera);

      // Routes
      document.getElementById('nav-routes')?.addEventListener('click', () => {
        toggleRouteMode();
      });

      // Profile
      document.getElementById('nav-profile')?.addEventListener('click', () => {
        state.showProfile = true;
        render();
        setupProfileListeners();
      });

      // Detail
      setupDetailListeners();
    }

    function setupDetailListeners() {
      document.getElementById('detail-close')?.addEventListener('click', () => {
        state.selectedSpot = null;
        state.comments = [];
        state.harvests = [];
        const container = document.getElementById('detail-container');
        if (container) container.innerHTML = '';
      });
      document.getElementById('detail-overlay')?.addEventListener('click', (e) => {
        if (e.target.id === 'detail-overlay') {
          state.selectedSpot = null;
          state.comments = [];
          state.harvests = [];
          const container = document.getElementById('detail-container');
          if (container) container.innerHTML = '';
        }
      });

      // Comment
      document.getElementById('comment-send')?.addEventListener('click', () => {
        const input = document.getElementById('comment-input');
        if (input?.value.trim()) {
          addComment(state.selectedSpot.id, input.value.trim());
          input.value = '';
        }
      });
      document.getElementById('comment-input')?.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          document.getElementById('comment-send')?.click();
        }
      });

      // Status update
      document.querySelectorAll('.status-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          if (state.selectedSpot) {
            updateSpotStatus(state.selectedSpot.id, btn.dataset.status);
          }
        });
      });

      // Directions
      document.getElementById('action-directions')?.addEventListener('click', () => {
        if (state.selectedSpot) {
          const url = `https://www.google.com/maps/dir/?api=1&destination=${state.selectedSpot.lat},${state.selectedSpot.lng}&travelmode=walking`;
          window.open(url, '_blank');
        }

        if (state.selectedSpot) logHarvest(state.selectedSpot.id);
      });

      document.getElementById('fav-btn')?.addEventListener('click', () => {
        if (state.selectedSpot) toggleFavorite(state.selectedSpot.id);
      });

      // Share
      document.getElementById('action-share')?.addEventListener('click', () => {
        if (state.selectedSpot) shareSpot(state.selectedSpot);
      });
    }

    function setupAddFormListeners() {
      document.getElementById('add-form-close')?.addEventListener('click', () => {
        state.showAddForm = false;
        state.spotPhoto = null;
        state.plantIdResult = null;
        // Remove form without full re-render to preserve map
        document.getElementById('add-form-screen')?.remove();
      });

      // Category picker
      document.querySelectorAll('.category-option').forEach(opt => {
        opt.addEventListener('click', () => {
          document.querySelectorAll('.category-option').forEach(o => o.classList.remove('selected'));
          opt.classList.add('selected');
          document.getElementById('add-category').value = opt.dataset.cat;
        });
      });

      // Property picker
      document.querySelectorAll('.property-option').forEach(opt => {
        opt.addEventListener('click', () => {
          document.querySelectorAll('.property-option').forEach(o => o.classList.remove('selected'));
          opt.classList.add('selected');
          document.getElementById('add-property').value = opt.dataset.prop;
        });
      });

      // Photo capture
      document.getElementById('photo-capture')?.addEventListener('click', (e) => {
        if (e.target.id !== 'remove-photo') {
          document.getElementById('photo-input')?.click();
        }
      });
      document.getElementById('photo-input')?.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (ev) => {
            // Resize image to save space
            const img = new Image();
            img.onload = () => {
              const canvas = document.createElement('canvas');
              const maxSize = 800;
              let w = img.width, h = img.height;
              if (w > h) { if (w > maxSize) { h *= maxSize / w; w = maxSize; } }
              else { if (h > maxSize) { w *= maxSize / h; h = maxSize; } }
              canvas.width = w; canvas.height = h;
              canvas.getContext('2d').drawImage(img, 0, 0, w, h);
              state.spotPhoto = canvas.toDataURL('image/jpeg', 0.7);
              document.getElementById('photo-preview-img').src = state.spotPhoto;
              document.getElementById('photo-preview').style.display = 'block';
              document.getElementById('photo-placeholder').style.display = 'none';

              // Auto-identify the plant
              state.plantIdResult = null;
              identifyPlant(state.spotPhoto);
            };
            img.src = ev.target.result;
          };
          reader.readAsDataURL(file);
        }
      });
      document.getElementById('remove-photo')?.addEventListener('click', (e) => {
        e.stopPropagation();
        state.spotPhoto = null;
        state.plantIdResult = null;
        document.getElementById('photo-preview').style.display = 'none';
        document.getElementById('photo-placeholder').style.display = 'block';
        document.getElementById('photo-input').value = '';
        renderPlantIdStatus();
      });

      // Use my location
      document.getElementById('use-my-location')?.addEventListener('click', () => {
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(
            (pos) => {
              document.getElementById('add-lat').value = pos.coords.latitude.toFixed(6);
              document.getElementById('add-lng').value = pos.coords.longitude.toFixed(6);
              showToast('Location captured! 📍');
            },
            () => showToast('Could not get location. Please enter manually.')
          );
        }
      });

      // Submit
      document.getElementById('add-spot-form')?.addEventListener('submit', (e) => {
        e.preventDefault();
        const form = e.target;
        addSpot({
          plant_name: form.plant_name.value,
          scientific_name: form.scientific_name.value || null,
          category: form.category.value,
          property_type: form.property_type.value,
          safety_level: form.safety_level.value,
          season: form.season.value || null,
          uses: form.uses.value || null,
          description: form.description.value || null,
          photo_url: state.spotPhoto || null,
          lat: parseFloat(form.lat.value),
          lng: parseFloat(form.lng.value),
          ripe_now: form.ripe_now.checked,
          status: 'plenty',
        });
      });
    }

    function setupProfileListeners() {
      document.getElementById('profile-close')?.addEventListener('click', () => {
        state.showProfile = false;
        const profileEl = document.querySelector('.profile-screen');
        if (profileEl) profileEl.remove();
      });
      document.getElementById('logout-btn')?.addEventListener('click', logout);

      // Username save
      document.getElementById('username-save')?.addEventListener('click', async () => {
        const input = document.getElementById('username-input');
        if (input) {
          const ok = await setUsername(input.value);
          if (ok) {
            const nameEl = document.getElementById('profile-display-name');
            if (nameEl) nameEl.textContent = input.value.trim();
          }
        }
      });
      document.getElementById('username-input')?.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('username-save')?.click();
      });

      // Follow buttons
      document.querySelectorAll('.follow-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const userId = btn.dataset.followId;
          const userName = btn.dataset.followName;
          toggleFollow(userId, userName);
          // Toggle button state
          if (isFollowing(userId)) {
            btn.className = 'follow-btn following';
            btn.textContent = '✓ Following';
          } else {
            btn.className = 'follow-btn not-following';
            btn.textContent = '+ Follow';
          }
        });
      });

      // Discord
      document.getElementById('discord-btn')?.addEventListener('click', () => {
        window.open(state.discordUrl || 'https://discord.gg/lofo', '_blank');
      });

      // Profile photo
      document.getElementById('profile-photo-btn')?.addEventListener('click', () => {
        document.getElementById('profile-photo-input')?.click();
      });
      document.getElementById('profile-photo-input')?.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (ev) => {
            const img = new Image();
            img.onload = () => {
              const canvas = document.createElement('canvas');
              canvas.width = 200; canvas.height = 200;
              const ctx = canvas.getContext('2d');
              const size = Math.min(img.width, img.height);
              const sx = (img.width - size) / 2;
              const sy = (img.height - size) / 2;
              ctx.drawImage(img, sx, sy, size, size, 0, 0, 200, 200);
              state.profilePhoto = canvas.toDataURL('image/jpeg', 0.8);
              localStorage.setItem('lofo_profile_photo', state.profilePhoto);
              render();
              setupProfileListeners();
              showToast('Profile photo updated! 📸');
            };
            img.src = ev.target.result;
          };
          reader.readAsDataURL(file);
        }
      });
    }

    // ============================
    // Helpers
    // ============================
    function showToast(msg) {
      state.toast = msg;
      const existing = document.getElementById('toast');
      if (existing) existing.remove();

      const div = document.createElement('div');
      div.className = 'toast';
      div.id = 'toast';
      div.innerHTML = `<span>🌿</span><span>${msg}</span>`;
      document.body.appendChild(div);

      setTimeout(() => {
        div.remove();
        state.toast = null;
      }, 3000);
    }

    function timeAgo(dateStr) {
      const now = new Date();
      const date = new Date(dateStr);
      const diff = Math.floor((now - date) / 1000);
      if (diff < 60) return 'just now';
      if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
      if (diff < 604800) return `${Math.floor(diff / 86400)}d ago`;
      return date.toLocaleDateString();
    }

    // ============================
    // Global event delegation
    // ============================
    document.addEventListener('click', (e) => {
      if (e.target.id === 'splash-agree') {
        state.screen = 'auth';
        render();
      }
      if (e.target.id === 'splash-legal-toggle') {
        const legal = document.getElementById('splash-legal');
        if (legal) legal.style.display = legal.style.display === 'none' ? 'block' : 'none';
      }
    });

    // ============================
    // Real-time subscriptions
    // ============================
    function setupRealtimeSubscriptions() {
      supabase
        .channel('spots-changes')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'spots' }, (payload) => {
          if (!state.spots.find(s => s.id === payload.new.id)) {
            state.spots.unshift(payload.new);
            updateMapPins();
            if (payload.new.user_id !== state.user?.id) {
              showToast(`New spot nearby: ${payload.new.plant_name}!`);
            }
          }
        })
        .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'spots' }, (payload) => {
          const idx = state.spots.findIndex(s => s.id === payload.new.id);
          if (idx >= 0) state.spots[idx] = payload.new;
          updateMapPins();
        })
        .subscribe();
    }

    // ============================
    // Init
    // ============================
    render();
    checkAuth().then(() => {
      setupRealtimeSubscriptions();
      startNearbyAlerts();
    });
  </script>
</body>
</html>
